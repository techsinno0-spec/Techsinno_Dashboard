<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSINNO — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="logo-text">TECHSINNO</div>
    <div class="logo-sub">Team Dashboard</div>
    <form id="loginForm" autocomplete="on">
      <div class="flbl">Username</div>
      <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="username" required>
      <div class="flbl">Password</div>
      <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password" required>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>
<script>
const API = '';
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) { err.textContent = 'Please enter username and password'; return; }
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.textContent = '';
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      err.textContent = data.error || 'Login failed';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    sessionStorage.setItem('ts_token', data.token);
    sessionStorage.setItem('ts_user', JSON.stringify(data.user));
    window.location.href = 'app.html';
  } catch (ex) {
    err.textContent = 'Connection error. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
if (sessionStorage.getItem('ts_token')) window.location.href = 'app.html';
</script>
</body>
</html>
