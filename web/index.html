<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHSINNO — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="logo-text">TECHSINNO</div>
    <div class="logo-sub">Team Dashboard</div>
    <form id="loginForm" autocomplete="on">
      <div class="flbl">Zoho / company email</div>
      <input type="email" id="loginUser" placeholder="frank@techsinno.com" autocomplete="username" required>
      <div class="flbl">Password</div>
      <input type="password" id="loginPass" placeholder="Enter your password" autocomplete="current-password" required>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
