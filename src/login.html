<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' http://localhost:* https://*.azurewebsites.net https://*.azurestaticapps.net;">
<title>TECHSINNO — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--brand:#1A6B8A;--brand-mid:#5fa8c4;--accent:#F4A300;--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--radius:12px;--radius-sm:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:360px;padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;text-align:center;}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;}
.logo-icon{width:40px;height:40px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:#fff;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--brand-mid);}
.login-sub{font-size:11px;color:var(--text3);margin-bottom:18px;font-family:'DM Mono',monospace;}
.flbl{font-size:11px;color:var(--text3);margin-bottom:4px;font-family:'DM Mono',monospace;text-align:left;margin-top:10px;}
input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s;}
input:focus{border-color:var(--brand-mid);}
.btn{width:100%;background:var(--brand);color:#fff;border:none;padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;margin-top:14px;}
.btn:hover{background:var(--brand-mid);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.login-err{color:#f85149;font-size:11px;margin-top:8px;min-height:16px;}
.version{font-size:9px;color:var(--text3);margin-top:14px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">T</div>
      <div class="logo-text">TECHSINNO</div>
    </div>
    <div class="login-sub">Team Dashboard · Sign In</div>
    <div class="flbl">Username</div>
    <input type="text" id="loginUser" placeholder="Enter your username" autofocus>
    <div class="flbl">Password</div>
    <input type="password" id="loginPass" placeholder="Enter your password">
    <div class="flbl">Cloud dashboard URL</div>
    <input type="url" id="apiBaseUrl" placeholder="https://your-app.azurestaticapps.net">
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
  <div class="version">TECHSINNO Dashboard v2.0</div>
</div>

<script>
const isElectron = !!(window.techsinno);

window.addEventListener('DOMContentLoaded', async () => {
  const apiBase = await window.techsinno.authGetApiBase();
  document.getElementById('apiBaseUrl').value = apiBase || '';
});

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('loginUser').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const apiBase = document.getElementById('apiBaseUrl').value.trim();
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');

  if (!username || !password) { err.textContent = 'Enter username and password'; return; }
  if (!apiBase) { err.textContent = 'Enter the cloud dashboard URL'; return; }

  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const configured = await window.techsinno.authSetApiBase(apiBase);
    if (!configured || configured.error) {
      throw new Error(configured?.error || 'Invalid cloud dashboard URL');
    }
    const result = await window.techsinno.authLogin(username, password);
    if (result && result.success) {
      window.location.href = 'index.html';
    } else {
      err.textContent = (result && result.error) || 'Login failed';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch (e) {
    err.textContent = 'Error: ' + (e.message || e);
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
