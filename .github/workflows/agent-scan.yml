name: Agent scan (scheduled)

# Runs the cloud AI agent scan on a schedule so both the web app and the
# desktop app always see a fresh queue — without either app being open.
# The scan runs server-side (/api/agent/scan) and writes to the shared
# Cosmos queue, which both clients read from.

on:
  schedule:
    # Every 2 hours, on the hour (UTC). SAST is UTC+2.
    # For hourly, change to:  '0 * * * *'
    - cron: '0 */2 * * *'
  # Adds a "Run workflow" button in the GitHub Actions tab for manual scans.
  workflow_dispatch: {}

# Never let two scans overlap.
concurrency:
  group: agent-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cloud agent scan
        env:
          API_BASE: ${{ secrets.DASHBOARD_API_BASE }}
          SCAN_USERNAME: ${{ secrets.SCAN_USERNAME }}
          SCAN_PASSWORD: ${{ secrets.SCAN_PASSWORD }}
        run: |
          set -euo pipefail

          finish_with_problem() {
            local message="$1"
            echo "::warning::$message"
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              exit 1
            fi
            echo "Scheduled scan skipped/failed without failing the workflow. Run this workflow manually to diagnose."
            exit 0
          }

          if [ -z "${API_BASE:-}" ]; then finish_with_problem "DASHBOARD_API_BASE secret is not set"; fi
          if [ -z "${SCAN_USERNAME:-}" ] || [ -z "${SCAN_PASSWORD:-}" ]; then finish_with_problem "SCAN_USERNAME or SCAN_PASSWORD secret is not set"; fi

          echo "Logging in as scan user..."
          LOGIN=$(curl -sS --max-time 30 -X POST "$API_BASE/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$SCAN_USERNAME\",\"password\":\"$SCAN_PASSWORD\"}" || true)

          TOKEN=$(echo "$LOGIN" | jq -r '.token // empty' 2>/dev/null || true)
          if [ -z "$TOKEN" ]; then
            finish_with_problem "Login failed: no token returned. Check SCAN_USERNAME, SCAN_PASSWORD, and DASHBOARD_API_BASE."
            # Do not print $LOGIN in full — it may contain sensitive detail.
          fi
          echo "Login OK."

          echo "Running agent scan..."
          RESP=$(curl -sS --max-time 180 -X POST "$API_BASE/api/agent/scan" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' || true)

          if [ -z "$RESP" ]; then
            finish_with_problem "Agent scan returned an empty response."
          fi

          if ! echo "$RESP" | jq -e . >/dev/null 2>&1; then
            finish_with_problem "Agent scan returned a non-JSON response."
          fi

          # Show a compact summary (never the token).
          echo "$RESP" | jq '{success, newItems, lastScan, errors}'

          if echo "$RESP" | jq -e 'has("error") or (.success == false)' >/dev/null 2>&1; then
            finish_with_problem "Agent scan endpoint reported an error."
          fi
          echo "Scan complete."
